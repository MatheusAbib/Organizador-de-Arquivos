<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Arquivos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
            padding: 40px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Login</div>
            <div class="tab" onclick="showTab('cadastro')">Cadastro</div>
        </div>

        <!-- Formulário de Login -->
        <div id="loginForm" class="form active">
            <h2>Bem-vindo de volta!</h2>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="loginSenha" placeholder="••••••••">
            </div>
            <button onclick="fazerLogin()">Entrar</button>
            <div id="loginMessage" class="message"></div>
        </div>

        <!-- Formulário de Cadastro -->
        <div id="cadastroForm" class="form">
            <h2>Crie sua conta</h2>
            <div class="input-group">
                <label>Nome</label>
                <input type="text" id="cadastroNome" placeholder="Seu nome completo">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="cadastroEmail" placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="cadastroSenha" placeholder="••••••••">
            </div>
            <button onclick="fazerCadastro()">Cadastrar</button>
            <div id="cadastroMessage" class="message"></div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            // Atualizar abas
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('cadastroForm').classList.add('active');
            }
        }

        async function fazerCadastro() {
            const nome = document.getElementById('cadastroNome').value;
            const email = document.getElementById('cadastroEmail').value;
            const senha = document.getElementById('cadastroSenha').value;
            const messageDiv = document.getElementById('cadastroMessage');

            // Validação básica
            if (!nome || !email || !senha) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Preencha todos os campos!';
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/cadastro', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nome, email, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Cadastro realizado com sucesso! Faça login.';
                    
                    // Limpar campos
                    document.getElementById('cadastroNome').value = '';
                    document.getElementById('cadastroEmail').value = '';
                    document.getElementById('cadastroSenha').value = '';
                    
                    // Mudar para aba de login após 2 segundos
                    setTimeout(() => showTab('login'), 1500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error || 'Erro ao cadastrar';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Erro de conexão com o servidor';
            }
        }

async function fazerLogin() {
    const email = document.getElementById('loginEmail').value;
    const senha = document.getElementById('loginSenha').value;
    const messageDiv = document.getElementById('loginMessage');

    if (!email || !senha) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Preencha todos os campos!';
        return;
    }

    try {
        const response = await fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, senha })
        });

        const data = await response.json();

        if (response.ok) {
            messageDiv.className = 'message success';
            messageDiv.textContent = 'Login realizado! Redirecionando...';
            
            localStorage.setItem('usuario', JSON.stringify(data.usuario));
            
            setTimeout(() => {
                if (data.usuario.tipo === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }, 1500);
        } else {
            messageDiv.className = 'message error';
            messageDiv.textContent = data.error || 'Email ou senha inválidos';
        }
    } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Erro de conexão com o servidor';
    }
}
    </script>
</body>
</html>
